<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>app</title>
  </head>
  <body style="background:#1a0f0a;color:#f5e6d3;font-family:monospace">
    <div id="root"></div>
    <!-- Synchronous polyfills: must load before any ES module (Buffer needed by crypto-browserify) -->
    <script src="/polyfills.js"></script>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#e07070"><h2>JS Error</h2><pre style="white-space:pre-wrap;margin-top:16px">' +
          msg + '\n\n' + (err && err.stack || '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#e07070"><h2>Unhandled Promise Rejection</h2><pre style="white-space:pre-wrap;margin-top:16px">' +
          String(e.reason) + '\n\n' + (e.reason && e.reason.stack || '') + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
